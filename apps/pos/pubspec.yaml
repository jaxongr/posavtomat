name: savdo_pos
description: SAVDO-POS — kassir/ofitsiant/oshxona ilovasi (offline-first)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State & routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  # Network
  dio: ^5.7.0
  # Offline-first cache + sync queue
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.5
  # Functional error handling (Either<Failure, T>)
  dartz: ^0.10.1
  # Idempotency keys
  uuid: ^4.5.1
  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
